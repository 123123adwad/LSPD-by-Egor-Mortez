<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSPD — Majestic RP New York</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/landing.css">
</head>
<body>

<div class="grid-overlay"></div>
<div class="cinematic-intro" id="cinematicIntro">
    <div class="intro-bg" id="introBg"></div>
    <div class="intro-particles" id="introParticles"></div>

    <div class="intro-phase intro-phase-1" id="phase1">
        <div class="init-terminal" id="initTerminal"></div>
    </div>

    <div class="intro-phase intro-phase-2" id="phase2">
        <div class="badge-container">
            <div class="badge-wrapper">
                <div class="badge-glow"></div>
                <svg class="badge-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#5b9de6;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#7db8f0;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="badgeGradDim" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#5b9de6;stop-opacity:0.2" />
                            <stop offset="100%" style="stop-color:#7db8f0;stop-opacity:0.05" />
                        </linearGradient>
                        <linearGradient id="starGrad" x1="50%" y1="0%" x2="50%" y2="100%">
                            <stop offset="0%" style="stop-color:#7db8f0;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#5b9de6;stop-opacity:0.9" />
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>

                    <circle cx="100" cy="100" r="70" fill="none" stroke="url(#badgeGrad)" stroke-width="1.2" filter="url(#glow)"/>
                    <circle cx="100" cy="100" r="64" fill="none" stroke="url(#badgeGradDim)" stroke-width="0.5"/>
                    <circle cx="100" cy="100" r="60" fill="rgba(91,157,230,0.03)" stroke="url(#badgeGradDim)" stroke-width="0.8"/>

                    <line x1="100" y1="30" x2="100" y2="36" stroke="rgba(91,157,230,0.3)" stroke-width="0.5"/>
                    <line x1="100" y1="164" x2="100" y2="170" stroke="rgba(91,157,230,0.3)" stroke-width="0.5"/>
                    <line x1="30" y1="100" x2="36" y2="100" stroke="rgba(91,157,230,0.3)" stroke-width="0.5"/>
                    <line x1="164" y1="100" x2="170" y2="100" stroke="rgba(91,157,230,0.3)" stroke-width="0.5"/>

                    <circle cx="100" cy="30" r="2" fill="rgba(91,157,230,0.5)"/>
                    <circle cx="100" cy="170" r="2" fill="rgba(91,157,230,0.5)"/>
                    <circle cx="30" cy="100" r="2" fill="rgba(91,157,230,0.5)"/>
                    <circle cx="170" cy="100" r="2" fill="rgba(91,157,230,0.5)"/>

                    <polygon
                        points="100,38 106,58 127,58 110,69 116,89 100,77 84,89 90,69 73,58 94,58"
                        fill="url(#starGrad)"
                        filter="url(#glow)"
                        opacity="0.95"
                    />

                    <text x="100" y="110" text-anchor="middle" fill="url(#badgeGrad)" font-size="16" font-weight="700" font-family="system-ui" letter-spacing="4">LSPD</text>
                    <text x="100" y="125" text-anchor="middle" fill="rgba(91,157,230,0.45)" font-size="5.5" font-family="system-ui" letter-spacing="2">LOS SANTOS POLICE</text>
                    <text x="100" y="134" text-anchor="middle" fill="rgba(91,157,230,0.35)" font-size="5" font-family="system-ui" letter-spacing="1.5">DEPARTMENT</text>

                    <line x1="55" y1="100" x2="145" y2="100" stroke="rgba(91,157,230,0.15)" stroke-width="0.3"/>

                    <path d="M 55 142 Q 100 148 145 142" fill="none" stroke="rgba(91,157,230,0.15)" stroke-width="0.5"/>
                    <path d="M 55 146 Q 100 152 145 146" fill="none" stroke="rgba(91,157,230,0.08)" stroke-width="0.3"/>
                </svg>
            </div>
        </div>
    </div>

    <div class="intro-phase intro-phase-3" id="phase3">
        <div class="dept-text">
            <div class="dept-name">Los Santos Police Department</div>
            <div class="dept-motto">To Protect and Serve</div>
        </div>
    </div>

    <div class="intro-phase intro-phase-4" id="phase4">
        <div class="enter-container">
            <div class="enter-line"></div>
            <div class="enter-info">
                <span class="enter-server">Majestic RP — New York</span>
                <span class="enter-credit">Created by <strong>Egor Mortez</strong></span>
            </div>
            <a href="handbook.html" class="enter-btn" id="enterBtn">
                <span class="enter-btn-text">ОТКРЫТЬ ПАМЯТКУ</span>
                <span class="enter-btn-arrow">&#10140;</span>
            </a>
        </div>
    </div>

    <div class="intro-skip" id="introSkip">Пропустить &#9654;</div>
</div>

<script src="js/landing.js"></script>
</body>
</html>
